  <ellipse cx="80" cy="355" rx="18" ry="3" fill="#2A2F38" opacity="0.4"/>
  <path d="M 62 355 L 64 330 L 96 330 L 98 355 Z" fill="#F4EFE6" stroke="#BCB4A4" stroke-width="1"/>
  <ellipse cx="80" cy="330" rx="16" ry="2.5" fill="#3D2817"/>
