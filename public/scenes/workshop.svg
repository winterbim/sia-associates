<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <!-- Warm room -->
  <rect width="600" height="400" fill="#E6DDC9"/>
  <!-- Back wall shadow -->
  <rect x="0" y="0" width="600" height="220" fill="#D8CEB7"/>
  <!-- Table -->
  <path d="M 0 280 L 600 280 L 550 400 L 50 400 Z" fill="#8B7355"/>
  <path d="M 0 280 L 600 280 L 600 300 L 0 300 Z" fill="#6F5B41"/>
  <!-- Laptop 1 (left) -->
  <g transform="translate(100 270)">
    <path d="M 0 0 L 90 0 L 100 -55 L -10 -55 Z" fill="#1a1f27"/>
    <rect x="-8" y="-53" width="106" height="53" fill="#0A0E12" rx="2"/>
    <!-- SAP Fiori tiles mock -->
    <rect x="-4" y="-48" width="22" height="14" fill="#C8A24B" opacity="0.6"/>
    <rect x="22" y="-48" width="22" height="14" fill="#6B7A8F" opacity="0.7"/>
    <rect x="48" y="-48" width="22" height="14" fill="#8BA68F" opacity="0.6"/>
    <rect x="74" y="-48" width="22" height="14" fill="#B5755B" opacity="0.6"/>
    <rect x="-4" y="-30" width="100" height="2" fill="#C8A24B" opacity="0.3"/>
    <rect x="-4" y="-24" width="60" height="2" fill="#6E6A62" opacity="0.4"/>
    <rect x="-4" y="-18" width="80" height="2" fill="#6E6A62" opacity="0.3"/>
    <rect x="-4" y="-12" width="45" height="2" fill="#6E6A62" opacity="0.3"/>
  </g>
  <!-- Notebook + pen (center) -->
  <g transform="translate(260 272)">
    <rect x="0" y="-4" width="90" height="4" fill="#6B1F2A"/>
    <rect x="0" y="-8" width="90" height="4" fill="#F4EFE6"/>
    <line x1="8" y1="-6" x2="82" y2="-6" stroke="#A8A29A" stroke-width="0.3"/>
    <!-- Pen -->
    <rect x="20" y="-10" width="55" height="2" fill="#C8A24B" transform="rotate(-8 47 -9)"/>
  </g>
  <!-- Coffee cup (right) -->
  <g transform="translate(420 268)">
    <ellipse cx="0" cy="0" rx="22" ry="4" fill="#2A2F38"/>
    <path d="M -22 0 L -20 -28 L 20 -28 L 22 0 Z" fill="#F4EFE6" stroke="#BCB4A4" stroke-width="1"/>
    <ellipse cx="0" cy="-28" rx="20" ry="3" fill="#3D2817"/>
    <path d="M 20 -20 Q 32 -20 32 -10 Q 32 -2 20 -4" fill="none" stroke="#F4EFE6" stroke-width="2"/>
  </g>
  <!-- Hanging portraits / sticky notes on wall -->
  <rect x="80" y="60" width="80" height="60" fill="#FDF5DC" transform="rotate(-3 120 90)" opacity="0.9"/>
  <rect x="180" y="55" width="80" height="60" fill="#FDF5DC" transform="rotate(2 220 85)" opacity="0.9"/>
  <rect x="280" y="65" width="80" height="60" fill="#C8A24B" opacity="0.3" transform="rotate(-1 320 95)"/>
  <text x="320" y="98" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="12" fill="#6B1F2A" transform="rotate(-1 320 95)">Go-Live</text>
  <rect x="380" y="58" width="80" height="60" fill="#FDF5DC" transform="rotate(4 420 88)" opacity="0.9"/>
  <text x="120" y="92" text-anchor="middle" font-family="monospace" font-size="10" fill="#2A2F38" transform="rotate(-3 120 90)">Sprint 03</text>
  <text x="220" y="87" text-anchor="middle" font-family="monospace" font-size="10" fill="#2A2F38" transform="rotate(2 220 85)">Fit-to-Std</text>
  <text x="420" y="90" text-anchor="middle" font-family="monospace" font-size="10" fill="#2A2F38" transform="rotate(4 420 88)">Hypercare</text>
  <!-- Light from window, soft -->
  <rect x="480" y="0" width="120" height="180" fill="#F4EFE6" opacity="0.15"/>
</svg>
